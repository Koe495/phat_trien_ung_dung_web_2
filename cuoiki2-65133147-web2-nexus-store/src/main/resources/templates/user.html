<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Quản lý Tài khoản</title>
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>

    <!-- Custom Cursor -->
    <div class="custom-cursor" id="customCursor">
        <svg class="custom-cursor-hexagon" id="customCursorHexagon" viewBox="0 0 24 24">
            <polygon points="12,2 21,7 21,17 12,22 3,17 3,7" fill="none" stroke-width="2" stroke-linejoin="round"/>
        </svg>
    </div>

    <!-- Header -->
    <header class="main-header">
        <a th:href="@{/}" class="logo-area">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            </svg>
            NEXUS
        </a>

        <div class="header-actions">
            <a th:href="@{/}" class="icon-btn" aria-label="Trang chủ">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </a>
        </div>
    </header>

    <!-- Main Layout -->
    <main class="account-layout">

        <!-- Sidebar -->
        <aside class="account-sidebar">
            <div class="user-profile-brief">
                <!-- Avatar: chữ cái đầu của lastName -->
                <div class="avatar-placeholder"
                     th:text="${#strings.substring(loggedInUser.lastName, 0, 1)}">
                </div>
                <!-- Họ tên đầy đủ -->
                <h2 class="user-name"
                    th:text="${loggedInUser.lastName + ' ' + loggedInUser.firstName}">
                </h2>
                <!-- Email -->
                <span class="user-email-brief" th:text="${loggedInUser.email}"></span>
            </div>

            <nav class="sidebar-menu">
                <button class="sidebar-link active" data-target="profile-pane">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Hồ sơ của tôi
                </button>
                <button class="sidebar-link" data-target="security-pane">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    Bảo mật & Mật khẩu
                </button>
                <a th:href="@{/logout}" class="sidebar-link logout">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Đăng xuất
                </a>
            </nav>
        </aside>

        <!-- Content Area -->
        <div class="account-content">

            <!-- Thông báo thành công (nếu có) -->
            <div th:if="${successMsg != null}"
                 style="color: #34c759; font-size: 14px; margin-bottom: 20px; text-align: center;
                        padding: 10px; border: 1px solid #34c759; border-radius: 8px;"
                 th:text="${successMsg}">
            </div>

            <!-- Thông báo lỗi (nếu có) -->
            <div th:if="${errorMsg != null}"
                 style="color: #ff3b30; font-size: 14px; margin-bottom: 20px; text-align: center;
                        padding: 10px; border: 1px solid #ff3b30; border-radius: 8px;"
                 th:text="${errorMsg}">
            </div>

            <!-- ======================================================
                 Pane 1: Hồ sơ cá nhân
                 ====================================================== -->
            <div class="tab-pane active" id="profile-pane">
                <div class="pane-header">
                    <h2 class="pane-title">Thông tin cá nhân</h2>
                    <p class="pane-subtitle">Quản lý thông tin hồ sơ để bảo mật tài khoản.</p>
                </div>

                <form id="profileForm"
                      th:action="@{/user/update-profile}"
                      th:object="${loggedInUser}"
                      method="POST">
                      
                    <input type="hidden" th:field="*{id}">

                    <div class="form-row">
                        <!-- Họ -->
                        <div class="form-group">
                            <input type="text"
                                   th:field="*{lastName}"
                                   id="lastName"
                                   class="form-input"
                                   placeholder=" "
                                   required
                                   autocomplete="family-name">
                            <label for="lastName" class="form-label" id="label-lastName">Họ</label>
                            <div class="notched-outline">
                                <div class="notched-outline-leading"></div>
                                <div class="notched-outline-notch" id="notch-lastName"></div>
                                <div class="notched-outline-trailing"></div>
                            </div>
                        </div>
                        <!-- Tên -->
                        <div class="form-group">
                            <input type="text"
                                   th:field="*{firstName}"
                                   id="firstName"
                                   class="form-input"
                                   placeholder=" "
                                   required
                                   autocomplete="given-name">
                            <label for="firstName" class="form-label" id="label-firstName">Tên</label>
                            <div class="notched-outline">
                                <div class="notched-outline-leading"></div>
                                <div class="notched-outline-notch" id="notch-firstName"></div>
                                <div class="notched-outline-trailing"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <input type="email"
                               th:field="*{email}"
                               id="email"
                               class="form-input"
                               placeholder=" "
                               required
                               autocomplete="email">
                        <label for="email" class="form-label" id="label-email">Địa chỉ Email</label>
                        <div class="notched-outline">
                            <div class="notched-outline-leading"></div>
                            <div class="notched-outline-notch" id="notch-email"></div>
                            <div class="notched-outline-trailing"></div>
                        </div>
                    </div>

                    <!-- Số điện thoại -->
                    <div class="form-group">
                        <input type="tel"
                               th:field="*{phone}"
                               id="phone"
                               class="form-input"
                               placeholder=" "
                               autocomplete="tel">
                        <label for="phone" class="form-label" id="label-phone">Số điện thoại</label>
                        <div class="notched-outline">
                            <div class="notched-outline-leading"></div>
                            <div class="notched-outline-notch" id="notch-phone"></div>
                            <div class="notched-outline-trailing"></div>
                        </div>
                    </div>

                    <button type="submit" class="btn-action btn-primary">Cập nhật thông tin</button>
                </form>
            </div>

            <!-- ======================================================
                 Pane 2: Bảo mật & Mật khẩu
                 ====================================================== -->
            <div class="tab-pane" id="security-pane">
                <div class="pane-header">
                    <h2 class="pane-title">Đổi mật khẩu</h2>
                    <p class="pane-subtitle">Để bảo mật tài khoản, vui lòng không chia sẻ mật khẩu cho người khác.</p>
                </div>

                <form id="passwordForm"
                      th:action="@{/user/change-password}"
                      method="POST">

                    <!-- Mật khẩu hiện tại -->
                    <div class="form-group">
                        <input type="password"
                               id="currentPassword"
                               name="currentPassword"
                               class="form-input"
                               placeholder=" "
                               required
                               autocomplete="current-password"
                               data-lpignore="true">
                        <label for="currentPassword" class="form-label" id="label-currentPassword">Mật khẩu hiện tại</label>
                        <button type="button" class="toggle-password" data-target="currentPassword" aria-label="Hiện mật khẩu">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                        <div class="notched-outline">
                            <div class="notched-outline-leading"></div>
                            <div class="notched-outline-notch" id="notch-currentPassword"></div>
                            <div class="notched-outline-trailing"></div>
                        </div>
                    </div>

                    <!-- Mật khẩu mới -->
                    <div class="form-group">
                        <input type="password"
                               id="newPassword"
                               name="newPassword"
                               class="form-input"
                               placeholder=" "
                               required
                               autocomplete="new-password"
                               data-lpignore="true">
                        <label for="newPassword" class="form-label" id="label-newPassword">Mật khẩu mới</label>
                        <button type="button" class="toggle-password" data-target="newPassword" aria-label="Hiện mật khẩu">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                        <div class="notched-outline">
                            <div class="notched-outline-leading"></div>
                            <div class="notched-outline-notch" id="notch-newPassword"></div>
                            <div class="notched-outline-trailing"></div>
                        </div>
                    </div>

                    <!-- Xác nhận mật khẩu mới -->
                    <div class="form-group">
                        <input type="password"
                               id="confirmPassword"
                               name="confirmPassword"
                               class="form-input"
                               placeholder=" "
                               required
                               autocomplete="new-password"
                               data-lpignore="true">
                        <label for="confirmPassword" class="form-label" id="label-confirmPassword">Xác nhận mật khẩu mới</label>
                        <button type="button" class="toggle-password" data-target="confirmPassword" aria-label="Hiện mật khẩu">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                        <div class="notched-outline">
                            <div class="notched-outline-leading"></div>
                            <div class="notched-outline-notch" id="notch-confirmPassword"></div>
                            <div class="notched-outline-trailing"></div>
                        </div>
                    </div>
                    <div class="error-message" id="pwError"></div>

                    <button type="submit" class="btn-action btn-primary">Thay đổi mật khẩu</button>
                </form>
            </div>

        </div><!-- /.account-content -->
    </main>

    <!-- Footer -->
    <footer class="store-footer">
        <p>© 2026 NEXUS Global Store. Bản quyền thiết kế tối giản thuộc về hệ sinh thái di động NEXUS.</p>
    </footer>

    <script th:src="@{/js/user.js}"></script>

</body>
</html>
