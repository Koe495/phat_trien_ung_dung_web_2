<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - NEXUS'">Sản phẩm - NEXUS</title>
    <link rel="stylesheet" th:href="@{/css/product-detail.css}">
</head>
<body>

    <!-- Custom Cursor -->
    <div class="custom-cursor" id="customCursor">
        <svg class="custom-cursor-hexagon" id="customCursorHexagon" viewBox="0 0 24 24">
            <polygon points="12,2 21,7 21,17 12,22 3,17 3,7" fill="none" stroke-width="2" stroke-linejoin="round"/>
        </svg>
    </div>

    <!-- Header -->
    <header class="main-header">
        <a th:href="@{/}" class="logo-area">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
            NEXUS
        </a>
        <div class="header-actions">
            <a th:href="@{/cart}" class="icon-btn cart-btn" aria-label="Giỏ hàng">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span class="cart-badge"
                      th:if="${loggedInUser != null and cartCount != null and cartCount > 0}"
                      th:text="${cartCount}"></span>
            </a>
            <!-- Chưa đăng nhập -->
            <a th:unless="${loggedInUser != null}" th:href="@{/login}" class="icon-btn" aria-label="Tài khoản">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </a>
            <!-- Đã đăng nhập -->
            <a th:if="${loggedInUser != null}" th:href="@{/user}" class="icon-btn user-avatar-btn"
               th:text="${#strings.substring(loggedInUser.lastName, 0, 1)}">
            </a>
        </div>
    </header>

    <!-- Builder Layout -->
    <main class="builder-layout">

        <!-- Sticky Gallery -->
        <div class="builder-gallery">
            <div class="device-mockup" id="productImage"
                 th:style="'background:' + ${product.thumbnailBg}">
            </div>
        </div>

        <!-- Configuration Panel -->
        <div class="builder-config">

            <p class="product-category" th:text="${product.category.name}"></p>
            <h1 class="product-title" th:text="${product.name}">Tên sản phẩm</h1>
            <p class="product-spec-line" th:text="${product.spec}"></p>
            <p class="product-price-large" id="totalPriceDisplay"
               th:text="'Từ ' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + '₫'">
            </p>

            <!-- Color Selection — chỉ hiện nếu có màu -->
            <div class="config-section" th:if="${product.colors != null and !product.colors.isEmpty()}">
                <h3 class="config-title">
                    Màu sắc. <span id="colorNameDisplay"
                                   th:text="${product.colors[0].colorName}">
                    </span>
                </h3>
                <div class="color-options">
                    <label class="color-label" th:each="color, colorStat : ${product.colors}">
                        <input type="radio" name="color"
                               th:value="${color.id}"
                               th:data-name="${color.colorName}"
                               th:data-bg="${product.thumbnailBg}"
                               th:checked="${colorStat.first}">
                        <div class="color-swatch">
                            <div class="color-swatch-inner"
                                 th:style="'background:' + ${color.colorHex}">
                            </div>
                        </div>
                        <span class="color-name" th:text="${color.colorName}"></span>
                    </label>
                </div>
            </div>

            <!-- Action Bar -->
            <div class="action-bar">
                <!-- POST thêm vào giỏ hàng -->
                <form th:action="@{/cart/add}" method="POST">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <input type="hidden" name="colorId"   id="selectedColorId"
                           th:value="${product.colors != null and !product.colors.isEmpty()} ? ${product.colors[0].id} : ''">
                    <input type="hidden" name="quantity"  value="1">
                    <button type="submit" class="btn-add-cart">Thêm vào Giỏ hàng</button>
                </form>

                <div class="delivery-info">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 18H3a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h3"></path><path d="M21 16v2a2 2 0 0 1-2 2h-3"></path><path d="M12 22v-4"></path><path d="M12 8V2"></path><rect x="5" y="8" width="14" height="8" rx="2" ry="2"></rect></svg>
                    Giao hàng miễn phí toàn quốc trong 2–3 ngày
                </div>
            </div>

        </div>
    </main>

    <script th:src="@{/js/product-detail.js}"></script>
</body>
</html>
