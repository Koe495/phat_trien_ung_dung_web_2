<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Đăng nhập tài khoản</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

    <!-- Custom Cursor -->
    <div class="custom-cursor" id="customCursor">
        <svg class="custom-cursor-hexagon" id="customCursorHexagon" viewBox="0 0 24 24">
            <polygon points="12,2 21,7 21,17 12,22 3,17 3,7" fill="none" stroke-width="2" stroke-linejoin="round"/>
        </svg>
    </div>

    <!-- Header tối giản -->
    <header class="login-header">
        <a th:href="@{/}" class="logo-area">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
            NEXUS
        </a>
    </header>

    <!-- Main Container -->
    <main class="login-main">
        <div class="login-card">
            
            <div class="card-header">
                <h1 class="card-title">Đăng nhập</h1>
                <p class="card-subtitle">Chưa có tài khoản Nexus ID? <a th:href="@{register}">Tạo ngay của bạn</a></p>
            </div>

            <form id="loginForm" th:action="@{/login}" method="POST" autocomplete="on">
                
    <div th:if="${errorMsg != null}" style="color: #ff3b30; font-size: 14px; margin-bottom: 20px; text-align: center; padding: 10px; border: 1px solid rgba(255, 59, 48, 0.3); border-radius: 8px; background-color: rgba(255, 59, 48, 0.05);" th:text="${errorMsg}"></div>
    
    <div th:if="${successMsg != null}" style="color: #34c759; font-size: 14px; margin-bottom: 20px; text-align: center; padding: 10px; border: 1px solid rgba(52, 199, 89, 0.3); border-radius: 8px; background-color: rgba(52, 199, 89, 0.05);" th:text="${successMsg}"></div>

    <div class="form-group">
        <input type="email" id="email" name="email" class="form-input" placeholder=" " required autocomplete="username">
        <label for="email" class="form-label" id="label-email">Email hoặc Số điện thoại</label>
        <div class="notched-outline">
            <div class="notched-outline-leading"></div>
            <div class="notched-outline-notch" id="notch-email"></div>
            <div class="notched-outline-trailing"></div>
        </div>
    </div>

    <div class="form-group">
        <input type="password" id="password" name="password" class="form-input" placeholder=" " required autocomplete="current-password" data-lpignore="true" data-bypass="true" data-dashlane-ignore="true">
        <label for="password" class="form-label" id="label-password">Mật khẩu</label>
        
        <button type="button" class="toggle-password" id="togglePasswordBtn" aria-label="Hiện mật khẩu">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>

        <div class="notched-outline">
            <div class="notched-outline-leading"></div>
            <div class="notched-outline-notch" id="notch-password"></div>
            <div class="notched-outline-trailing"></div>
        </div>
    </div>

    <div class="form-options">
        <label class="remember-me">
            <input type="checkbox" id="remember" name="remember">
            Duy trì đăng nhập
        </label>
        <a th:href="@{#}" class="forgot-password">Quên mật khẩu?</a>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">Tiếp tục</button>

</form>

            <div class="divider">Hoặc</div>

            <!-- Social Logins -->
            <div class="social-buttons">
                <button class="social-btn" aria-label="Đăng nhập bằng Google">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 8A4 4 0 1 1 8 12"></path></svg>
                </button>
                <button class="social-btn" aria-label="Đăng nhập bằng Apple">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2A10 10 0 1 0 22 12A10 10 0 0 0 12 2Z"></path><path d="M12 16a4 4 0 1 1 0-8a4 4 0 0 1 0 8Z"></path></svg>
                </button>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="store-footer">
        <p>© 2026 NEXUS Global Store. Bản quyền thiết kế tối giản thuộc về hệ sinh thái di động NEXUS.</p>
    </footer>

    <!-- Scripts -->
    <script th:src="@{/js/login.js}"></script>
</body>
</html>
